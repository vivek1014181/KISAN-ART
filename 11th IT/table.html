<html>
<head>
<title> table in html </title> 
</head>
<body>
<table border="4" bordercolor="black" bgcolor="cyan" align="center" cellspacing="2" cellpadding="5">
<caption> data of student </caption>
<tr style="background-color:gray">
<th> roll no </th>
<th> name </th>
<th> class </th> 
<th> percentage </th>
</tr>
<tr align="center">

<td ><marquee > <mark style="background-color:pink"><u>harshil</u> </mark></marquee></td> 
<td> 11th com </td>
<td style="background-color:red"> 25% </td>
</tr>
<tr align="center">
<td style="background-color:gray" > 2 </td>
<td ><marquee><mark style="background-color:pink"> <u>vivek</u></mark> </marquee></td>
<td> 11th sci </td>
<td style="background-color:green"> 82% </td>
</tr>
<tr align="center">
<td style="background-color:gray"> 3 </td>
<td ><marquee ><mark style="background-color:pink"> <u>hemant</u></mark> </marquee></td>
<td> 11th sci </td>
<td style="background-color:green"> 88% </td>
</tr>
<tr align="center">
<td style="background-color:gray"> 4 </td>
<td ><marquee><mark style="background-color:pink"> <u>yash gupta</u></mark></marquee> </td>
<td> 11th com </td>
<td style="background-color:red"> 6% </td>
</tr>
<tr align="center">
<td style="background-color:gray"> 5 </td>
<td colspan="2" ><marquee><mark style="background-color:pink"> <u>sanket</u></mark></marquee> </td>
<td style="background-color:green" rowspan="2"> 12% </td>
</tr>
<tr align="center">
<td style="background-color:gray"> 6 </td>
<td ><marquee><mark style="background-color:pink"> <u> adiphoo</u></mark></marquee> </td>

<td style="background-color:red"> 6% </td>
</tr>
</table>
</body>
</html>
