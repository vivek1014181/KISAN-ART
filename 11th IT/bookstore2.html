<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookVerse 6.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #02010a;
      --text-color: #f5f5f5;
      --accent-color: #00fff5;
      --book-bg: rgba(255,255,255,0.05);
      --btn-bg: transparent;
      --btn-color: var(--accent-color);
    }
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top left, #0f0f1f, var(--bg-color), #000);
      color: var(--text-color);
      transition: 0.4s;
    }
    header {
      font-family: "Cinzel", serif;
      text-align: center;
      padding: 25px;
      font-size: 2.8rem;
      background: #111;
      border-bottom: 2px solid var(--accent-color);
      text-shadow: 0 0 15px var(--accent-color);
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #modeToggle {
      cursor: pointer;
      font-size: 1rem;
      background: var(--btn-bg);
      color: var(--btn-color);
      border: 2px solid var(--accent-color);
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
    }
    #modeToggle:hover {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 10px var(--accent-color);
    }
    nav {
      display: flex;
      justify-content: center;
      background: #080808;
      border-bottom: 1px solid var(--accent-color);
    }
    nav a {
      color: var(--accent-color);
      padding: 15px 25px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }
    nav a:hover {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 15px var(--accent-color);
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      font-family: "Cinzel", serif;
      color: var(--accent-color);
      text-shadow: 0 0 10px var(--accent-color);
      margin-bottom: 20px;
    }
    .books {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 25px;
      margin: 40px auto;
      max-width: 1400px;
    }
    .book {
      background: var(--book-bg);
      border: 2px solid var(--accent-color);
      border-radius: 15px;
      padding: 15px;
      transition: 0.4s;
      box-shadow: 0 0 10px rgba(0, 255, 245, 0.2);
    }
    .book:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 25px var(--accent-color);
    }
    .book img {
      width: 100px;
      height: 150px;
      border-radius: 10px;
      border: 2px solid var(--accent-color);
    }
    .book h3 {
      font-family: "Cinzel", serif;
      color: var(--accent-color);
      margin: 10px 0 5px;
    }
    .book p {
      color: #ddd;
      margin: 0;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #080808;
      border-top: 2px solid var(--accent-color);
    }

    /* Game styles */
    .game-menu {
      margin-bottom: 20px;
    }
    .game-menu button {
      margin: 5px;
      background: var(--btn-bg);
      color: var(--btn-color);
      border: 2px solid var(--accent-color);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }
    .game-menu button:hover {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 15px var(--accent-color);
    }
    #rpsGame button {
      font-size: 2rem;
      padding: 20px 30px;
    }
    #ticTacToeBoard {
      display: none;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin: 20px auto;
    }
    .cell {
      width: 100px;
      height: 100px;
      background: var(--book-bg);
      border: 2px solid var(--accent-color);
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--accent-color);
      transition: 0.3s;
    }
    .cell:hover {
      background: rgba(0, 255, 245, 0.2);
    }
    #rpsResult, #guessResult {
      margin-top: 15px;
      font-size: 1.3rem;
      text-shadow: 0 0 10px var(--accent-color);
    }
    #guessGame {
      display: none;
      margin-top: 20px;
    }
    #guessGame input {
      padding: 10px;
      font-size: 1rem;
      width: 60px;
      margin-right: 10px;
      border-radius: 6px;
      border: 2px solid var(--accent-color);
      background: var(--book-bg);
      color: var(--text-color);
    }
  </style>
</head>
<body>
  <header>
    📚 BookVerse 6.0
    <button id="modeToggle" onclick="toggleMode()">Bright Mode</button>
  </header>

  <nav>
    <a href="#home">Home</a>
    <a href="#books">Books</a>
    <a href="#games">Games</a>
  </nav>

  <div class="container" id="home">
    <h2>Welcome to BookVerse</h2>
    <p>Explore amazing books and play fun games!</p>
  </div>

  <div class="container" id="books">
    <h2>Books Collection</h2>
    <div class="books" id="bookContainer">
      <!-- Books will be generated here -->
    </div>
  </div>

  <div class="container" id="games">
    <h2>🎮 Mini Games</h2>
    <div class="game-menu">
      <button onclick="showGame('ticTacToe')">Tic Tac Toe</button>
      <button onclick="showGame('rps')">Rock Paper Scissors</button>
      <button onclick="showGame('guess')">Guess the Number</button>
    </div>

    <!-- Tic Tac Toe -->
    <div id="ticTacToeBoard">
      <div class="cell" onclick="playerMove(0)"></div>
      <div class="cell" onclick="playerMove(1)"></div>
      <div class="cell" onclick="playerMove(2)"></div>
      <div class="cell" onclick="playerMove(3)"></div>
      <div class="cell" onclick="playerMove(4)"></div>
      <div class="cell" onclick="playerMove(5)"></div>
      <div class="cell" onclick="playerMove(6)"></div>
      <div class="cell" onclick="playerMove(7)"></div>
      <div class="cell" onclick="playerMove(8)"></div>
    </div>

    <!-- Rock Paper Scissors -->
    <div id="rpsGame">
      <button onclick="playRPS('rock')">🪨 Rock</button>
      <button onclick="playRPS('paper')">📜 Paper</button>
      <button onclick="playRPS('scissors')">✂️ Scissors</button>
      <div id="rpsResult"></div>
    </div>

    <!-- Guess the Number -->
    <div id="guessGame">
      <p>Guess a number between 1 and 100!</p>
      <input type="number" id="guessInput" min="1" max="100" />
      <button onclick="checkGuess()">Guess</button>
      <div id="guessResult"></div>
    </div>
  </div>

  <footer>© 2025 BookVerse 6.0 | Designed by ChatGPT</footer>

  <script>
    // ----- Dark/Bright Mode -----
    let darkMode = true;
    function toggleMode() {
      darkMode = !darkMode;
      if(darkMode){
        document.documentElement.style.setProperty('--bg-color','#02010a');
        document.documentElement.style.setProperty('--text-color','#f5f5f5');
        document.documentElement.style.setProperty('--accent-color','#00fff5');
        document.getElementById('modeToggle').textContent = 'Bright Mode';
      } else {
        document.documentElement.style.setProperty('--bg-color','#fff');
        document.documentElement.style.setProperty('--text-color','#000');
        document.documentElement.style.setProperty('--accent-color','#0077ff');
        document.getElementById('modeToggle').textContent = 'Dark Mode';
      }
    }

    // ----- Generate 60 books -----
    const books = [];
    for(let i=1;i<=60;i++){
      books.push({
        title: `Book Title ${i}`,
        price: (Math.random()*20+5).toFixed(2),
        img: `https://picsum.photos/100/150?random=${i}`
      });
    }
    const bookContainer = document.getElementById('bookContainer');
    books.forEach(book => {
      const div = document.createElement('div');
      div.className = 'book';
      div.innerHTML = `<img src="${book.img}" alt="${book.title}" />
      <h3>${book.title}</h3>
      <p>$${book.price}</p>`;
      bookContainer.appendChild(div);
    });

    // ----- Game Menu -----
    function showGame(game){
      document.getElementById('ticTacToeBoard').style.display = game==='ticTacToe'?'grid':'none';
      document.getElementById('rpsGame').style.display = game==='rps'?'block':'none';
      document.getElementById('guessGame').style.display = game==='guess'?'block':'none';
      if(game==='ticTacToe') resetTicTacToe();
      if(game==='guess') startGuess();
      if(game==='rps') document.getElementById('rpsResult').textContent = '';
    }

    // ----- Rock Paper Scissors -----
    function playRPS(userChoice){
      const choices = ['rock','paper','scissors'];
      const computerChoice = choices[Math.floor(Math.random()*3)];
      let result='';
      if(userChoice===computerChoice) result = "It's a tie!";
      else if((userChoice==='rock'&&computerChoice==='scissors')||
              (userChoice==='paper'&&computerChoice==='rock')||
              (userChoice==='scissors'&&computerChoice==='paper')) result='🎉 You win!';
      else result = '💻 Computer wins!';
      document.getElementById('rpsResult').textContent = `You chose ${userChoice}, computer chose ${computerChoice}. ${result}`;
    }

    // ----- Guess the Number -----
    let secretNumber, attempts;
    function startGuess(){
      secretNumber = Math.floor(Math.random()*100)+1;
      attempts =0;
      document.getElementById('guessInput').value='';
      document.getElementById('guessResult').textContent='';
    }
    function checkGuess(){
      let guess = parseInt(document.getElementById('guessInput').value);
      if(!guess || guess<1 || guess>100){
        document.getElementById('guessResult').textContent='Enter a valid number 1-100.';
        return;
      }
      attempts++;
      if(guess===secretNumber){
        document.getElementById('guessResult').textContent=`🎉 Correct! You guessed it in ${attempts} attempts!`;
      } else if(guess<secretNumber){
        document.getElementById('guessResult').textContent='📈 Too low!';
      } else {
        document.getElementById('guessResult').textContent='📉 Too high!';
      }
    }

    // ----- Tic Tac Toe Smart AI -----
    let board=[], player='X', computer='O', active=false;
    function resetTicTacToe(){
      board=['','','','','','','','',''];
      document.querySelectorAll('.cell').forEach(c=>c.textContent='');
      active=true;
    }
    function playerMove(i){
      if(!active||board[i]!=='') return;
      board[i]=player;
      updateBoard();
      if(checkWinner(player)){ alert('🎉 You win!'); active=false; return;}
      if(board.every(c=>c!=='')){ alert('🤝 Draw!'); active=false; return;}
      computerMove();
    }
    function computerMove(){
      if(!active) return;
      let move = findBestMove();
      board[move]=computer;
      updateBoard();
      if(checkWinner(computer)){ alert('💻 Computer wins!'); active=false; return;}
      if(board.every(c=>c!=='')){ alert('🤝 Draw!'); active=false;}
    }
    function updateBoard(){
      document.querySelectorAll('.cell').forEach((c,i)=>c.textContent=board[i]);
    }
    function checkWinner(sym){
      const wins = [[0,1,2],[3,4,5],[6,7,8],
                    [0,3,6],[1,4,7],[2,5,8],
                    [0,4,8],[2,4,6]];
      return wins.some(line=>line.every(i=>board[i]===sym));
    }
    // AI: Try to win, block, or random
    function findBestMove(){
      for(let i=0;i<9;i++){ if(board[i]===''){ board[i]=computer; if(checkWinner(computer)){ board[i]=''; return i;} board[i]=''; }}
      for(let i=0;i<9;i++){ if(board[i]===''){ board[i]=player; if(checkWinner(player)){ board[i]=''; return i;} board[i]=''; }}
      let empty = board.map((v,i)=>(v===''?i:null)).filter(v=>v!==null);
      return empty[Math.floor(Math.random()*empty.length)];
    }
  </script>
</body>
</html>
